<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coinstorm Arena</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">在线版本</p>
          <h1>Coinstorm Arena</h1>
          <p class="summary">
            躲避四面八方冲来的敌人，拾取黄色金币，攒满 10 分获得一次技能机会。
            `Space` 冲刺，`F` 护盾。
          </p>
          <div class="legend">
            <span><i class="player"></i> 玩家</span>
            <span><i class="coin"></i> 金币</span>
            <span><i class="enemy scout"></i> 敌人</span>
          </div>
        </div>
        <div class="panel">
          <div class="hud">
            <div>
              <strong id="score">分数 0</strong>
              <span id="level">等级 1</span>
            </div>
            <div>
              <strong id="charges">技能次数 0</strong>
              <span id="status">方向键/WASD 移动</span>
            </div>
          </div>
          <canvas id="game" width="960" height="600" aria-label="Coinstorm Arena"></canvas>
          <div class="tips">
            <span>移动：WASD / 方向键</span>
            <span>冲刺：Space</span>
            <span>护盾：F</span>
            <span>重新开始：R</span>
          </div>
        </div>
      </section>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
